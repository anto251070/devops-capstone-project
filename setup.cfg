[nosetests]
# Sets verbosity to level 2 for detailed output
verbosity=2
# Enables the spec plugin for readable test names
with-spec=1
spec-color=1
# Enables coverage reporting for the 'service' package
with-coverage=1
cover-erase=1
cover-package=service

[coverage:report]
show_missing = True

[flake8]
per-file-ignores =
    */__init__.py: F401 E402

[pylint.'MESSAGES CONTROL']
disable=E1101
